<!-- Interactive Layer Script -->
<script>
        function toggleDetails(name) {
            console.log('Opening bar:', name);
            const sheet = document.getElementById('bottom-sheet');
            sheet.classList.remove('translate-y-[65%]');
            sheet.classList.add('translate-y-0');
            // Logic for focusing a specific bar card could go here
        }

        // Close sheet on map click
        document.querySelector('.map-container').addEventListener('click', () => {
            const sheet = document.getElementById('bottom-sheet');
            if (window.innerWidth < 768) {
                sheet.classList.add('translate-y-[65%]');
                sheet.classList.remove('translate-y-0');
            }
        });

        // Add small atmospheric movement
        window.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) / 100;
            const moveY = (e.clientY - window.innerHeight / 2) / 100;
            document.querySelector('.map-container img').style.transform = `scale(1.1) translate(${moveX}px, ${moveY}px)`;
        });
    </script>
